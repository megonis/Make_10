{% extends "base.html" %}
{% block content %}
  <!-- Lista das lojas já cadastradas com acesso rápido ao painel individual. -->
  <section class="card">
    <h2>Lojas Cadastradas</h2>
    {% if stores %}
      <ul class="store-list">
        {% for store in stores %}
          <li class="store-list-item">
            <div class="store-list-copy">
              <strong>{{ store.name }}</strong>
              <small>Painel da loja</small>
            </div>
            <a href="{{ url_for('store_detail', store_id=store.id) }}" class="store-enter-link" aria-label="Entrar na loja {{ store.name }}">
              <span>Entrar</span>
              <span class="store-enter-icon">›</span>
            </a>
          </li>
        {% endfor %}
      </ul>
    {% else %}
      <p>Ainda não há lojas cadastradas.</p>
    {% endif %}
  </section>

  <!-- Formulário simples para cadastro de uma nova loja no sistema. -->
  <section class="card subtle-card">
    <h2>Cadastrar Loja</h2>
    <form method="post" class="grid-form" autocomplete="off">
      <label for="name">Nome da loja</label>
      <input id="name" name="name" required placeholder="Ex.: Loja Centro" autocomplete="off" />
      <button type="submit">Adicionar loja</button>
    </form>
  </section>
{% endblock %}
